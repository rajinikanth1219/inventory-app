<!DOCTYPE html>
<html>
<head>
    <title>Purchase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container container-box">
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <h3 class="text-center">Purchase Stock</h3>

        <form method="POST">
            <select name="source" class="form-control my-2">
                <option value="Farmer">Farmer</option>
                <option value="Retail">Retail</option>
            </select>

            <input class="form-control my-2" name="item" placeholder="Item" required>
            <input class="form-control my-2" name="quantity" placeholder="Quantity" required>
            <input class="form-control my-2" name="cost" placeholder="Cost" required>

            <button class="btn btn-primary w-100 mt-2">Submit</button>
        </form>

        <p class="text-center mt-3 text-danger">{{ message }}</p>
    </div>
</div>

</body>
</html>
