<!DOCTYPE html>
<html>
<head>
    <title>Sell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container container-box">
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <h3 class="text-center">Sell Stock</h3>

        <form method="POST">
            <input class="form-control my-2" name="item" placeholder="Item" required>
            <input class="form-control my-2" name="quantity" placeholder="Quantity" required>
            <input class="form-control my-2" name="price" placeholder="Selling Price" required>

            <button class="btn btn-success w-100 mt-2">Sell</button>
        </form>

        <p class="text-center mt-3 text-danger">{{ message }}</p>
    </div>
</div>

</body>
</html>
